name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Save build metadata
        run: |
          echo "Build completed on $(date -u)" > build-info.txt
          echo "Node: $(node -v)" >> build-info.txt
          echo "NPM: $(npm -v)" >> build-info.txt

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build-info.txt
